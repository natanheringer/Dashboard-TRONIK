<!-- Empty State Component (reusable across preview) -->
{% if estado_vazio %}
<div class="empty-state" role="status">
  <div class="empty-state-content">
    <div class="empty-state-icon">
      {% if icon_type == "mapa" %}
      <i data-lucide="map-pin" class="icon" style="width: 48px; height: 48px;"></i>
      {% elif icon_type == "relatorios" %}
      <i data-lucide="file-text" class="icon" style="width: 48px; height: 48px;"></i>
      {% elif icon_type == "sensores" %}
      <i data-lucide="radio" class="icon" style="width: 48px; height: 48px;"></i>
      {% else %}
      <i data-lucide="inbox" class="icon" style="width: 48px; height: 48px;"></i>
      {% endif %}
    </div>
    <h3 class="empty-state-title">{{ titulo }}</h3>
    <p class="empty-state-description">{{ descricao }}</p>
    {% if sugestao %}
    <p class="empty-state-hint">💡 {{ sugestao }}</p>
    {% endif %}
  </div>
</div>
{% endif %}
