<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Tronik · Preview{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Roboto+Mono:wght@400;500&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/v2/tokens.css') }}?v={{ cache_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/v2/preview.css') }}?v={{ cache_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/v2/motion.css') }}?v={{ cache_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/v2/nik.css') }}?v={{ cache_version }}">
  {% block head_extra %}{% endblock %}
</head>
<body>

{% if config.get('PREVIEW_SHOW_BADGE', False) %}
<div class="preview-badge">PREVIEW v2</div>
{% endif %}

<!-- Mobile topbar -->
<div class="mobile-topbar">
  <div class="mobile-topbar-brand-row">
    <div class="brand-mark">T</div>
    <div class="mobile-topbar-title">Tronik</div>
  </div>
  <button class="mobile-menu-btn" type="button" onclick="togglePreviewSidebar()" aria-label="Abrir menu">
    <i data-lucide="menu" class="icon" style="width: 20px; height: 20px;"></i>
  </button>
</div>

<div class="sidebar-backdrop" onclick="togglePreviewSidebar()"></div>

<div class="app">
  {% include 'preview/_partials/_sidebar.html' %}

  <main class="main">
    <div class="view active" id="view-{{ current|default('home') }}">
      {% block conteudo %}{% endblock %}
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js" crossorigin="anonymous" defer></script>
<script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js" defer></script>
<script src="{{ url_for('static', filename='js/v2/preview.js') }}?v={{ cache_version }}" defer></script>
<script src="{{ url_for('static', filename='js/v2/nik-loader.js') }}?v={{ cache_version }}" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    if (window.lucide) {
      lucide.createIcons();
    }
  });
</script>
{% block scripts_extra %}{% endblock %}
</body>
</html>
